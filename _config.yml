# Minimal Mistakes（远程主题）— 文档：https://mmistakes.github.io/minimal-mistakes/docs/quick-start-guide/
remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: "air"

locale: zh-CN
title: nk7
title_separator: " · "
subtitle: ""
name: nk7
description: "记录学习与实践"
url: "https://nk7667.github.io"
baseurl: ""
repository: "nk7667/nk7667.github.io"

timezone: Asia/Shanghai

# 文章 URL（默认按日期，改动会改变已发布链接）
permalink: /:year/:month/:day/:title/
# 若要「分类嵌套」进地址，可改为（需同步调整站内链接）：
# permalink: /:categories/:year/:month/:day/:title/

words_per_minute: 200

markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  entity_output: as_char
  smart_quotes: lsquo,rsquo,ldquo,rdquo

sass:
  sass_dir: _sass
  style: compressed

# 分页（首页文章列表）
paginate: 5
paginate_path: /page:num/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# 与 GitHub Pages 白名单一致
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - _posts/README.md

# 作者侧栏
author:
  name: nk7
  bio: ""
  location: "China"
  links:
    - label: GitHub
      icon: "fab fa-fw fa-github"
      url: "https://github.com/nk7667"

footer:
  links:
    - label: GitHub
      icon: "fab fa-fw fa-github"
      url: "https://github.com/nk7667"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      show_date: true
      read_time: false
      comments: false
      share: false
      related: true
      toc: true
      toc_sticky: true
      toc_label: "本页目录"
      toc_icon: "list-ul"
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
