{% comment %}
  在 main.css 之后加载，强制覆盖侧栏目录（不依赖 Sass 合并是否生效）
{% endcomment %}
{% if site.github.build_revision %}
  {% assign asset_v = site.github.build_revision | slice: 0, 7 %}
{% else %}
  {% assign asset_v = site.time | date: '%s' %}
{% endif %}

<link rel="stylesheet" href="{{ '/assets/css/toc-sidebar.css' | relative_url }}?v={{ asset_v }}">
<link rel="stylesheet" href="{{ '/assets/css/layout-article.css' | relative_url }}?v={{ asset_v }}">

<script src="{{ '/assets/js/code-copy.js' | relative_url }}?v={{ asset_v }}" defer></script>
<script src="{{ '/assets/js/toc-scrollspy.js' | relative_url }}?v={{ asset_v }}" defer></script>
